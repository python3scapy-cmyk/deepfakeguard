<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Granted · DeepfakeGuard</title>
<style>
  :root{
    --bg: #0B0E14;
    --bg-2: #10141d;
    --mint: #29F6B0;
    --violet: #8B6BFF;
    --text: #F2F5F9;
    --muted: #7D8798;
    --danger: #FF5C7A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(circle at 50% 30%, rgba(139,107,255,0.14), transparent 55%),
      radial-gradient(circle at 20% 80%, rgba(41,246,176,0.08), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* faint scan grid */
  body::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(circle at 50% 45%, black 0%, transparent 70%);
    pointer-events:none;
  }

  .stage{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 28px;
    z-index:2;
  }

  /* ---- radar / scan ring ---- */
  .scan-wrap{
    position:relative;
    width:172px; height:172px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring{
    position:absolute; inset:0;
    border-radius:50%;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .ring.r2{ inset:16px; border-color: rgba(255,255,255,0.06); }
  .ring.r3{ inset:32px; border-color: rgba(255,255,255,0.05); }

  .sweep{
    position:absolute; inset:0;
    border-radius:50%;
    background: conic-gradient(from 0deg, rgba(41,246,176,0) 0deg, rgba(41,246,176,0.55) 40deg, rgba(41,246,176,0) 90deg);
    animation: spin 1.35s linear infinite;
    animation-iteration-count: 2;
    opacity:1;
    animation-fill-mode: forwards;
  }
  .sweep.done{ animation: none; opacity:0; transition: opacity .4s ease; }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .shield{
    position:relative;
    width:60px; height:66px;
    z-index:3;
    filter: drop-shadow(0 0 0 rgba(41,246,176,0));
    transition: filter .5s ease;
  }
  .shield svg{ width:100%; height:100%; display:block; }
  .shield path.outline{
    fill:none;
    stroke: var(--muted);
    stroke-width:1.6;
    transition: stroke .4s ease;
  }
  .shield path.check{
    fill:none;
    stroke: var(--mint);
    stroke-width: 2.4;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray: 26;
    stroke-dashoffset: 26;
  }

  .shield.glitch{ animation: glitch .28s steps(2,end) 2; }
  @keyframes glitch{
    0%{ transform: translate(0,0); }
    25%{ transform: translate(-2px,1px); }
    50%{ transform: translate(2px,-1px); }
    75%{ transform: translate(-1px,0); }
    100%{ transform: translate(0,0); }
  }

  .shield.verified path.outline{ stroke: var(--mint); }
  .shield.verified{ filter: drop-shadow(0 0 14px rgba(41,246,176,0.45)); }
  .shield.verified path.check{
    animation: draw .38s ease forwards;
    animation-delay: .05s;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  /* ---- text ---- */
  .status{
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    height: 18px;
    opacity:0;
    transform: translateY(4px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .status.show{ opacity:1; transform:none; }

  .room-code{
    font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    font-size: 28px;
    letter-spacing: 0.3em;
    color: var(--text);
    display:flex;
    gap: 2px;
  }
  .room-code span{
    opacity:0;
    transform: translateY(6px);
    display:inline-block;
    transition: opacity .25s ease, transform .25s ease;
  }
  .room-code span.in{ opacity:1; transform:none; }
  .room-code span.accent{ color: var(--violet); }

  .caption{
    font-size: 14px;
    color: var(--muted);
    opacity:0;
    transition: opacity .4s ease;
  }
  .caption.show{ opacity:1; }
  .caption b{ color: var(--text); font-weight:600; }

  .progress-track{
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--violet), var(--mint));
    transition: width 2.1s cubic-bezier(.2,.8,.2,1);
  }

  @media (prefers-reduced-motion: reduce){
    .sweep, .shield.glitch{ animation:none; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="scan-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="sweep" id="sweep"></div>
      <div class="shield" id="shield">
        <svg viewBox="0 0 60 66" fill="none">
          <path class="outline" d="M30 2 L56 12 V30 C56 46 44 58 30 64 C16 58 4 46 4 30 V12 Z"/>
          <path class="check" d="M18 32 L27 41 L43 23"/>
        </svg>
      </div>
    </div>

    <div class="status" id="status">SKAN EDİLİR</div>

    <div class="room-code" id="roomCode"></div>

    <div class="caption" id="caption">Otaq: <b id="captionRole">—</b></div>

    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
  </div>

<script>
  // --- read params passed from choose.html ---
  const params = new URLSearchParams(window.location.search);
  const room = (params.get('room') || '------').toUpperCase();
  const role = params.get('role') === 'verifier' ? 'verifier' : 'participant';
  const destination = role === 'verifier' ? '/dashboard' : '/participant';

  const statusEl = document.getElementById('status');
  const sweepEl = document.getElementById('sweep');
  const shieldEl = document.getElementById('shield');
  const roomEl = document.getElementById('roomCode');
  const captionEl = document.getElementById('caption');
  const captionRoleEl = document.getElementById('captionRole');
  const progressEl = document.getElementById('progress');

  const messages = [
    'SKAN EDİLİR',
    'KİMLİK YOXLANILIR',
    'KANAL ŞİFRƏLƏNİR'
  ];

  // cycle status text while scanning
  let mi = 0;
  statusEl.classList.add('show');
  const statusInterval = setInterval(() => {
    statusEl.classList.remove('show');
    setTimeout(() => {
      mi = (mi + 1) % messages.length;
      statusEl.textContent = messages[mi];
      statusEl.classList.add('show');
    }, 180);
  }, 620);

  // progress bar starts filling immediately
  requestAnimationFrame(() => { progressEl.style.width = '100%'; });

  // after scan sweep finishes (~1.35s * 2 loops)
  setTimeout(() => {
    clearInterval(statusInterval);
    statusEl.classList.remove('show');

    sweepEl.classList.add('done');
    shieldEl.classList.add('glitch');

    setTimeout(() => {
      shieldEl.classList.remove('glitch');
      shieldEl.classList.add('verified');

      // reveal room code letter by letter
      const chars = room.split('');
      chars.forEach((ch, i) => {
        const span = document.createElement('span');
        span.textContent = ch;
        if (i === chars.length - 1) span.classList.add('accent');
        roomEl.appendChild(span);
        setTimeout(() => span.classList.add('in'), i * 55);
      });

      captionRoleEl.textContent = role === 'verifier' ? 'Verifier kimi qoşulursan' : 'Participant kimi qoşulursan';
      setTimeout(() => captionEl.classList.add('show'), chars.length * 55 + 100);
    }, 320);

    // redirect
    setTimeout(() => {
      window.location.href = `${destination}?room=${encodeURIComponent(room)}`;
    }, 2300);

  }, 1350);
</script>

</body>
</html>
