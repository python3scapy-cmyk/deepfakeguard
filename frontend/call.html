<!DOCTYPE html>
<html>
<head>
  <title>DeepfakeGuard — Call</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
  <video id="localVideo" autoplay playsinline muted width="320"></video>
  <video id="remoteVideo" autoplay playsinline width="320"></video>

  <script>
    const ROOM = "demo-room";
    const socket = io(window.location.hostname === 'localhost' 
  ? 'http://localhost:5000' 
  : `http://${window.location.hostname}:5000`);
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
    let pc, localStream;

    async function start() {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('localVideo').srcObject = localStream;

      pc = new RTCPeerConnection(config);
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

      pc.ontrack = (event) => {
        document.getElementById('remoteVideo').srcObject = event.streams[0];
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { room: ROOM, candidate: event.candidate });
        }
      };

      socket.emit('join', { room: ROOM });
    }

    socket.on('peer-joined', async () => {
      // Whoever is already in the room makes the offer when a second peer joins
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      socket.emit('offer', { room: ROOM, sdp: offer });
    });

    socket.on('offer', async (data) => {
      await pc.setRemoteDescription(data.sdp);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('answer', { room: ROOM, sdp: answer });
    });

    socket.on('answer', async (data) => {
      await pc.setRemoteDescription(data.sdp);
    });

    socket.on('ice-candidate', async (data) => {
      try {
        await pc.addIceCandidate(data.candidate);
      } catch (err) {
        console.error("ICE candidate error:", err);
      }
    });

    start();
  </script>
</body>
</html>
